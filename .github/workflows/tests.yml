name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
    EXTNAME: avathar/bbguildlineage2
    DEPENDENT_EXTNAME: avathar/bbguild
    DEPENDENT_REPO: avatharbe/bbguild
    PHPBB_BRANCH: '3.3.x'

jobs:
  # Reusable framework runs the basic checks (EPV, sniff, exec files, image ICC).
  # DB matrix jobs are disabled here because they don't check out the bbguild
  # core dependency; the unit-tests job below covers that.
  basic-checks:
    uses: phpbb-extensions/test-framework/.github/workflows/tests.yml@3.3.x
    with:
      EXTNAME: 'avathar/bbguildlineage2'
      PRIMARY_PHP_VERSION: '8.1'
      PHP_VERSION_MATRIX: '["8.1"]'
      RUN_MYSQL_JOBS: 0
      RUN_PGSQL_JOBS: 0
      RUN_MSSQL_JOBS: 0
      RUN_WINDOWS_JOBS: 0

  unit-tests:
    name: PHP ${{ matrix.php }} - postgres
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          -v /var/run/postgresql:/var/run/postgresql
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout phpBB
        uses: actions/checkout@v6
        with:
          repository: phpbb/phpbb
          ref: ${{ env.PHPBB_BRANCH }}
          path: phpBB3

      - name: Checkout extension
        uses: actions/checkout@v6
        with:
          path: phpBB3/phpBB/ext/${{ env.EXTNAME }}

      - name: Checkout bbguild core (dependency)
        uses: actions/checkout@v6
        with:
          repository: ${{ env.DEPENDENT_REPO }}
          ref: main
          path: phpBB3/phpBB/ext/${{ env.DEPENDENT_EXTNAME }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysqli, sqlite, pdo_sqlite, intl, gd, exif, iconv
          coverage: none

      - name: Setup environment for phpBB
        run: .github/setup-phpbb.sh postgres ${{ matrix.php }} 0
        working-directory: ./phpBB3

      - name: Setup database
        run: .github/setup-database.sh postgres 0
        working-directory: ./phpBB3

      - name: Setup PHPUnit files
        run: mkdir -p "phpBB/ext/$EXTNAME/.github" && cp .github/phpunit* "$_"
        working-directory: ./phpBB3

      - name: Run unit tests
        run: |
          phpBB/vendor/bin/phpunit \
              --configuration "phpBB/ext/$EXTNAME/.github/phpunit-postgres-github.xml" \
              --bootstrap ./tests/bootstrap.php \
              --exclude-group functional
        working-directory: ./phpBB3
